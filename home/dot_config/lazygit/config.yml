# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/refs/heads/master/schema/config.json

git:
  pagers:
    - externalDiffCommand: difft --color=always

customCommands:
  - key: "<c-g>"
    context: "files"
    description: "Autogenerate commit message from staged diff (Gemini)"
    # lazygit's `quote` escapes backticks POSIX-style (\`), but our login shell is
    # fish, which keeps \` as a literal backslash+backtick. Strip the stray backslash
    # so the committed message matches what's shown in the prompt.
    command: 'git commit -m (string replace --all -- \\` \` {{.Form.Message | quote}})'
    loadingText: "Generating commit message..."
    prompts:
      - type: "input"
        title: "Commit message:"
        key: "Message"
        initialValue: "{{ runCommand `sh -c '\"$HOME/.config/lazygit/gen-commit-msg.py\"'` }}"
